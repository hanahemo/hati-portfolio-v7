<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>admin login · hati</title>
  <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Nanum+Gothic+Coding:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="admin-body admin-body--login">
  <main class="login">
    <div class="login__tag">private · admin</div>
    <h1 class="login__title">hati</h1>
    <p class="login__sub">billboard control room</p>
    <form id="loginForm" class="login__form" autocomplete="off">
      <input
        id="loginPw"
        type="password"
        name="password"
        placeholder="enter password"
        aria-label="admin password"
        class="admin-input login__input"
        required
        autofocus
      >
      <button type="submit" class="admin-pill admin-pill--primary">enter →</button>
    </form>
    <div id="loginError" class="login__err" role="alert" aria-live="polite"></div>
    <div class="login__foot">© hati studio — private room</div>
  </main>
  <script>
    const form = document.getElementById('loginForm');
    const err = document.getElementById('loginError');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      const pw = form.password.value;
      try {
        const r = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });
        if (r.ok) { location.href = '/admin'; }
        else { err.textContent = 'wrong password'; form.password.select(); }
      } catch (_) {
        err.textContent = 'network error';
      }
    });
  </script>
</body>
</html>
